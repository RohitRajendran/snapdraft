<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
        background: #f5f0e8;
        font-family: 'Courier New', monospace;
        display: flex;
        align-items: stretch;
      }

      .left {
        width: 500px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 64px 56px;
      }

      .logo {
        font-family: 'Courier New', monospace;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #2c2c2c;
        margin-bottom: 36px;
      }

      .headline {
        font-family: 'Courier New', monospace;
        font-size: 58px;
        font-weight: 700;
        line-height: 1.08;
        color: #1a1714;
        margin-bottom: 28px;
      }

      .headline em {
        font-style: normal;
        color: #2d5490;
      }

      .tagline {
        font-family: 'Courier New', monospace;
        font-size: 18px;
        color: #1a1714;
        line-height: 1.6;
      }

      .right {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f0e8;
        position: relative;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div class="left">
      <div class="logo">SnapDraft</div>
      <div class="headline">Sketch<br/>floor plans<br/>in your<br/><em>browser.</em></div>
      <div class="tagline">From idea to floor plan in minutes.</div>
    </div>

    <div class="right">
      <svg width="700" height="630" viewBox="0 0 700 630" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="minor" width="38" height="38" patternUnits="userSpaceOnUse">
            <path d="M 38 0 L 0 0 0 38" fill="none" stroke="#ccd9e8" stroke-width="0.5"/>
          </pattern>
          <pattern id="major" width="190" height="190" patternUnits="userSpaceOnUse">
            <rect width="190" height="190" fill="url(#minor)"/>
            <path d="M 190 0 L 0 0 0 190" fill="none" stroke="#a8bcd4" stroke-width="0.75"/>
          </pattern>
        </defs>

        <rect width="700" height="630" fill="#f5f0e8"/>
        <rect width="700" height="630" fill="url(#major)"/>

        <g transform="translate(64, 108)">
          <!-- BED -->
          <rect x="182" y="2" width="190" height="253"
            fill="rgba(74,111,165,0.06)" stroke="#2d5490" stroke-width="1.5"
            stroke-dasharray="4 3" rx="1"/>
          <text x="186" y="16"
            font-family="'Courier New', monospace" font-size="11" fill="#2d5490">Bed</text>

          <!-- LEFT NIGHTSTAND -->
          <rect x="122" y="2" width="57" height="76"
            fill="rgba(74,111,165,0.06)" stroke="#2d5490" stroke-width="1.5"
            stroke-dasharray="4 3" rx="1"/>
          <text x="126" y="16"
            font-family="'Courier New', monospace" font-size="11" fill="#2d5490">NS</text>

          <!-- RIGHT NIGHTSTAND -->
          <rect x="376" y="2" width="57" height="76"
            fill="rgba(74,111,165,0.06)" stroke="#2d5490" stroke-width="1.5"
            stroke-dasharray="4 3" rx="1"/>
          <text x="380" y="16"
            font-family="'Courier New', monospace" font-size="11" fill="#2d5490">NS</text>

          <!-- DRESSER -->
          <rect x="341" y="321" width="190" height="57"
            fill="rgba(74,111,165,0.06)" stroke="#2d5490" stroke-width="1.5"
            stroke-dasharray="4 3" rx="1"/>
          <text x="345" y="335"
            font-family="'Courier New', monospace" font-size="11" fill="#2d5490">Dresser</text>

          <!-- ARMCHAIR -->
          <g transform="translate(67, 308) rotate(-25)">
            <rect x="-47" y="-47" width="95" height="95"
              fill="rgba(74,111,165,0.06)" stroke="#2d5490" stroke-width="1.5"
              stroke-dasharray="4 3" rx="1"/>
            <text x="-43" y="-33"
              font-family="'Courier New', monospace" font-size="11" fill="#2d5490">Armchair</text>
          </g>

          <!-- WALLS -->
          <polyline
            points="114,380 0,380 0,0 532,0 532,380 228,380"
            fill="none" stroke="#2c2c2c" stroke-width="6"
            stroke-linecap="square" stroke-linejoin="miter"/>
        </g>
      </svg>
    </div>
  </body>
</html>
